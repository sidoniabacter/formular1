
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <title>WelcomePage</title>
    </head>

<body class="bg-[url('spital1.jpeg')] bg-cover bg-center bg-no-repeat flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-100">
        <form action="http://localhost/formular1/" method="post">
            <!-- Title -->
            <h1 class="text-3xl font-bold mb-2">Bine ați venit</h1>
            <p class="text-gray-500 mb-6">Hospital Management System</p>

            <!-- Email -->
            <input type="email" placeholder="Email"
                class="w-full mb-4 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" />

            <!-- Password -->
            <input type="password" placeholder="Password"
                class="w-full mb-2 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" />

            <!-- Remember me -->
            <div class="flex items-center mb-6">
                <input type="checkbox" class="mr-2">
                <label class="text-sm text-gray-600">Remember me</label>
            </div>

            <!-- Login button -->
            <button class="w-full bg-blue-500 text-white py-3 rounded-full mb-4 hover:bg-blue-600  transition">
                Login
            </button>

            <!-- Divider -->
            <div class="flex items-center my-4">
                <div class="flex-grow border-t"></div>
            </div>


            <!-- Extra buttons -->
            <div class="flex flex-col items-center gap-2 text-sm mt-4">

                <button class="text-blue-500 hover:underline">
                    Ai uitat parola?
                </button>

                <button class="text-blue-500 hover:underline">
                    Crează un Cont
                </button>
            </div>
        </form>

    </div>

</body>

</html>
